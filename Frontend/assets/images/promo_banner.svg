<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <radialGradient id="bg1" cx="25%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1C110A"/>
      <stop offset="100%" stop-color="#060607"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <linearGradient id="divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FBBF24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FBBF24" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#D97706" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowMd" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSm" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="url(#bg1)"/>

  <!-- Ambient glow left (behind bolt) -->
  <circle cx="310" cy="314" r="260" fill="#D97706" opacity="0.09"/>
  <circle cx="310" cy="314" r="150" fill="#FBBF24" opacity="0.07"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#FBBF24" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="200" y1="0" x2="200" y2="628"/>
    <line x1="500" y1="0" x2="500" y2="628"/>
    <line x1="700" y1="0" x2="700" y2="628"/>
    <line x1="1000" y1="0" x2="1000" y2="628"/>
  </g>

  <!-- ── Left: Icon area ── -->
  <!-- Ring -->
  <circle cx="310" cy="304" r="240"
          fill="none" stroke="url(#goldGrad)"
          stroke-width="2.5" stroke-dasharray="10 7"
          opacity="0.3"/>
  <circle cx="310" cy="304" r="198"
          fill="none" stroke="#FBBF24"
          stroke-width="1" opacity="0.1"/>

  <!-- Bolt glow -->
  <polygon points="360,110 260,330 325,330 280,510 430,280 350,280 415,110"
           fill="#D97706" opacity="0.3" filter="url(#glow)"/>
  <!-- Bolt main -->
  <polygon points="360,110 260,330 325,330 280,510 430,280 350,280 415,110"
           fill="url(#goldGrad)" filter="url(#glow)"/>

  <!-- ECG pulse under bolt -->
  <polyline
    points="80,430  145,430  168,395  190,460  215,375  238,465  260,430  310,430"
    fill="none" stroke="url(#pulseGrad)"
    stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glowSm)"/>
  <line x1="310" y1="430" x2="480" y2="430"
        stroke="url(#pulseGrad)" stroke-width="5"
        stroke-linecap="round" opacity="0.3"/>

  <!-- Sparkles around bolt -->
  <g filter="url(#glowMd)" opacity="0.9">
    <line x1="480" y1="145" x2="480" y2="195" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
    <line x1="455" y1="170" x2="505" y2="170" stroke="#FBBF24" stroke-width="4" stroke-linecap="round"/>
    <line x1="462" y1="152" x2="498" y2="188" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
    <line x1="498" y1="152" x2="462" y2="188" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  </g>
  <g filter="url(#glowMd)" opacity="0.6">
    <line x1="140" y1="175" x2="140" y2="215" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="120" y1="195" x2="160" y2="195" stroke="#FBBF24" stroke-width="3.5" stroke-linecap="round"/>
  </g>
  <circle cx="490" cy="310" r="5" fill="#FBBF24" opacity="0.6" filter="url(#glowMd)"/>
  <circle cx="135" cy="310" r="3.5" fill="#FBBF24" opacity="0.4" filter="url(#glowMd)"/>
  <circle cx="465" cy="420" r="4" fill="#D97706" opacity="0.5" filter="url(#glowMd)"/>

  <!-- Vertical separator -->
  <line x1="560" y1="80" x2="560" y2="548"
        stroke="url(#divider)" stroke-width="1.5"/>

  <!-- ── Right: Text area ── -->

  <!-- PRO badge -->
  <rect x="620" y="88" width="110" height="36" rx="18"
        fill="#FBBF24" fill-opacity="0.12"
        stroke="#FBBF24" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="675" y="112"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="16" font-weight="900"
        fill="#FBBF24" text-anchor="middle"
        letter-spacing="3">PRO</text>

  <!-- App name -->
  <text x="620" y="210"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="100" font-weight="900"
        fill="white" text-anchor="start"
        letter-spacing="-3"
        filter="url(#textGlow)"
        opacity="0.97">FİT</text>

  <text x="748" y="210"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="100" font-weight="900"
        text-anchor="start"
        letter-spacing="-3"
        filter="url(#textGlow)">
    <tspan fill="url(#goldText)">AI</tspan>
  </text>

  <!-- Tagline -->
  <text x="620" y="258"
        font-family="'Arial', sans-serif"
        font-size="22" font-weight="400"
        fill="white" fill-opacity="0.55"
        text-anchor="start"
        letter-spacing="3">AI POWERED FITNESS COACHING</text>

  <!-- Divider line under tagline -->
  <line x1="620" y1="282" x2="1130" y2="282"
        stroke="#FBBF24" stroke-width="1" opacity="0.15"/>

  <!-- Feature list -->
  <!-- Feature 1 -->
  <g>
    <circle cx="638" cy="334" r="18" fill="#FBBF24" fill-opacity="0.1"
            stroke="#FBBF24" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="638" y="340" font-family="Arial" font-size="16" fill="#FBBF24"
          text-anchor="middle">⚡</text>
    <text x="670" y="341"
          font-family="'Arial', sans-serif" font-size="20" font-weight="700"
          fill="white" fill-opacity="0.88">AI Koç — Claude ile</text>
  </g>
  <!-- Feature 2 -->
  <g>
    <circle cx="638" cy="394" r="18" fill="#FBBF24" fill-opacity="0.1"
            stroke="#FBBF24" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="638" y="400" font-family="Arial" font-size="16" fill="#FBBF24"
          text-anchor="middle">📷</text>
    <text x="670" y="401"
          font-family="'Arial', sans-serif" font-size="20" font-weight="700"
          fill="white" fill-opacity="0.88">Kamera ile Besin Analizi</text>
  </g>
  <!-- Feature 3 -->
  <g>
    <circle cx="638" cy="454" r="18" fill="#FBBF24" fill-opacity="0.1"
            stroke="#FBBF24" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="638" y="460" font-family="Arial" font-size="16" fill="#FBBF24"
          text-anchor="middle">📈</text>
    <text x="670" y="461"
          font-family="'Arial', sans-serif" font-size="20" font-weight="700"
          fill="white" fill-opacity="0.88">Gelişmiş Trend ve Analiz</text>
  </g>

  <!-- CTA button -->
  <rect x="620" y="502" width="310" height="62" rx="18"
        fill="white"/>
  <text x="775" y="540"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="22" font-weight="900"
        fill="#1A0F05" text-anchor="middle"
        letter-spacing="0.5">Premium'u Keşfet</text>

  <!-- Price badge -->
  <rect x="948" y="502" width="196" height="62" rx="18"
        fill="#FBBF24" fill-opacity="0.1"
        stroke="#FBBF24" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="1046" y="527"
        font-family="'Arial Black', Arial, sans-serif"
        font-size="28" font-weight="900"
        fill="#FBBF24" text-anchor="middle">149₺</text>
  <text x="1046" y="552"
        font-family="'Arial', sans-serif"
        font-size="16" font-weight="500"
        fill="#FBBF24" fill-opacity="0.7"
        text-anchor="middle"
        letter-spacing="1">/ ay</text>

  <!-- Bottom brand line -->
  <text x="600" y="600"
        font-family="'Arial', sans-serif"
        font-size="14" font-weight="400"
        fill="white" fill-opacity="0.2"
        text-anchor="middle"
        letter-spacing="4">fitai.app  •  AI DESTEKLI FITNESS TAKIP</text>
</svg>
