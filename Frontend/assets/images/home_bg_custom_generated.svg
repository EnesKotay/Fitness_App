<svg width="1440" height="2560" viewBox="0 0 1440 2560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131A24"/>
      <stop offset="55%" stop-color="#101722"/>
      <stop offset="100%" stop-color="#0B111A"/>
    </linearGradient>

    <radialGradient id="warmGlow" cx="50%" cy="22%" r="52%">
      <stop offset="0%" stop-color="#FFB176" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#FFB176" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coolGlow" cx="8%" cy="45%" r="42%">
      <stop offset="0%" stop-color="#73BEFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#73BEFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111822"/>
      <stop offset="100%" stop-color="#090E15"/>
    </linearGradient>

    <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <filter id="objBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="2560" fill="url(#bg)"/>
  <rect width="1440" height="2560" fill="url(#warmGlow)"/>
  <rect width="1440" height="2560" fill="url(#coolGlow)"/>

  <!-- soft rays -->
  <g opacity="0.16" stroke="#FFFFFF" stroke-linecap="round" filter="url(#softBlur)">
    <line x1="-120" y1="180" x2="680" y2="1180" stroke-width="18"/>
    <line x1="-80" y1="260" x2="730" y2="1200" stroke-width="14"/>
    <line x1="-30" y1="340" x2="790" y2="1220" stroke-width="10"/>
  </g>

  <!-- wall texture -->
  <g opacity="0.06">
    <path d="M0 540 C 350 500, 980 610, 1440 520" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M0 940 C 430 980, 1020 870, 1440 920" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M0 1320 C 400 1280, 1040 1370, 1440 1310" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- floor -->
  <rect x="0" y="1700" width="1440" height="860" fill="url(#floorGrad)"/>
  <line x1="0" y1="1700" x2="1440" y2="1700" stroke="#000000" stroke-opacity="0.18" stroke-width="2"/>

  <!-- props -->
  <g filter="url(#objBlur)">
    <!-- dumbbells -->
    <rect x="90" y="1940" width="300" height="88" rx="36" fill="#0B1017" fill-opacity="0.92"/>
    <rect x="250" y="2050" width="260" height="84" rx="34" fill="#0C1118" fill-opacity="0.82"/>

    <!-- shaker -->
    <rect x="450" y="1840" width="130" height="350" rx="52" fill="#0A0F16" fill-opacity="0.95"/>
    <rect x="474" y="1798" width="82" height="56" rx="18" fill="#111923" fill-opacity="0.95"/>

    <!-- jump rope -->
    <ellipse cx="760" cy="2140" rx="190" ry="46" fill="none" stroke="#1C2532" stroke-width="14"/>
    <ellipse cx="760" cy="2142" rx="128" ry="28" fill="none" stroke="#222D3D" stroke-width="8"/>

    <!-- yoga mat -->
    <rect x="980" y="1880" width="460" height="260" rx="52" fill="#0B121C" fill-opacity="0.90"/>
    <rect x="1000" y="1910" width="420" height="210" rx="46" fill="none" stroke="#2A394D" stroke-opacity="0.58" stroke-width="4"/>
  </g>

  <rect width="1440" height="2560" fill="url(#vignette)"/>
</svg>
