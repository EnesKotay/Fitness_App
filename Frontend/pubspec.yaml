name: fitness
description: "Fitness tracking mobile application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.7
  confetti: ^0.7.0
  
  # HTTP Client
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.5+1

  # AI & Environment
  google_generative_ai: ^0.4.0
  
  # Local Storage (2.5.4 - shared_preferences_android compileSdk uyumluluğu için)
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^9.2.2
  
  # Date/Time
  intl: ^0.19.0
  
  # Charts
  fl_chart: ^0.66.0

  # Network images (bölge kartları için önbellekli görsel)
  cached_network_image: ^3.3.1

  # JSON Serialization
  json_annotation: ^4.8.1

  # Diyet / Kalori Takibi
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  pdf: ^3.11.3
  printing: ^5.14.2
  http: ^1.6.0
  
  # Local Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4


  # Offline Sync
  connectivity_plus: ^6.1.0

  # In-App Purchase (App Store & Google Play abonelik)
  in_app_purchase: ^3.2.0

  # URL Launch (video rehberi, dış linkler)
  url_launcher: ^6.3.1

  # Crash Reporting (production hata takibi)
  sentry_flutter: ^8.14.0

  # App Icon Generator
  flutter_launcher_icons: ^0.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # JSON Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  # Hive Generation
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: false
  windows:
    generate: false

flutter:
  uses-material-design: true
  config:
    enable-swift-package-manager: false
  assets:
    - assets/images/
    - assets/foods/
