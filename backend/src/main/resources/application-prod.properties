############################################################
# 🚀 PRODUCTION PROFILE — quarkus.profile=prod ile aktif olur
# Bu dosya application.properties'deki geliştirme ayarlarını
# production ortamına uygun değerlerle ezar (override eder).
############################################################

############################################################
# 🔒 DATABASE — Tüm bağlantı bilgileri env'den alınmalı
############################################################
quarkus.datasource.jdbc.url=${DB_URL}
quarkus.datasource.username=${DB_USERNAME}
quarkus.datasource.password=${DB_PASSWORD}

############################################################
# 🔒 HIBERNATE — Production'da Flyway yönetir, Hibernate sadece doğrular
############################################################
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

############################################################
# 🔒 LOGGING — SQL debug logları kapalı
############################################################
quarkus.log.category."org.hibernate.SQL".level=WARN

############################################################
# 🔒 CORS — Mobil uygulama CORS'a tabi değildir
############################################################
quarkus.http.cors.enabled=false

############################################################
# 🔒 MAILER — Geçerli TLS sertifikası zorunlu
############################################################
quarkus.mailer.trust-all=false

############################################################
# 🔒 JWT — Secret env'den alınmalı, fallback yok
############################################################
smallrye.jwt.sign.key=${JWT_SECRET_KEY}

############################################################
# 💳 IN-APP PURCHASE — Gerçek doğrulama
############################################################
iap.verify.mode=strict
iap.apple.sandbox=false
