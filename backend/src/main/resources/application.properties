############################################################
# ??? DATABASE CONFIG (PostgreSQL)
############################################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/fitness_db}

############################################################
# ?? HIBERNATE CONFIGURATION
############################################################

# Tabloları otomatik oluştur/güncelle (geliştirme için). Quarkus 3.x: schema-management.strategy
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

############################################################
# ?? FLYWAY CONFIGURATION (Database Migrations)
############################################################
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
# Schema zaten dolu ama flyway_schema_history yoksa: history tablosu oluştur, mevcut durumu baseline say, sonra migration'ları uygula
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

############################################################
# ?? HTTP SERVER CONFIG
############################################################
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

############################################################
# ?? CORS CONFIGURATION (Mobil Uygulama İçin)
############################################################
# Quarkus 3.x: quarkus.http.cors.enabled kullanılır (quarkus.http.cors deprecated)
quarkus.http.cors.enabled=true
# Tüm origin'lere izin ver (geliştirme için)
# Production'da sadece mobil app domain'ini ekle
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=origin,content-type,accept,authorization,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

############################################################
# ?? LOGGING CONFIGURATION
############################################################
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."io.quarkus".level=INFO

# Hibernate SQL logları (debug için)
quarkus.log.category."org.hibernate.SQL".level=DEBUG

############################################################
# ?? DEVELOPMENT SETTINGS
############################################################
# DevServices kapalı (manuel PostgreSQL kullanılıyor)
quarkus.devservices.enabled=false
# macOS stty locale hatasi pom.xml JVM args ile cozuldu

############################################################
# ?? APPLICATION CONFIGURATION
############################################################
quarkus.application.name=fitness-backend
quarkus.application.version=1.0.0

############################################################
# ?? JWT (Token oluşturma - login/register)
############################################################
# HS256 için gizli anahtar (en az 32 karakter). Production'da env'den al.
smallrye.jwt.sign.key=${JWT_SECRET_KEY}
smallrye.jwt.new-token.signature-algorithm=HS256
smallrye.jwt.new-token.lifespan=1800
smallrye.jwt.new-token.issuer=fitness-backend

# Inbound JWT doğrulama (Quarkus Security)
mp.jwt.verify.issuer=fitness-backend
smallrye.jwt.verify.algorithm=HS256

# Manual token validation is used in controllers; disable proactive auth to prevent early framework 401s
quarkus.http.auth.proactive=false


# /api/ai/* container seviyesinde JWT zorunlu olmasin; controller kendi token kontrolunu yapiyor
quarkus.http.auth.permission.ai.paths=/api/ai/*
quarkus.http.auth.permission.ai.policy=permit

############################################################
# AI COACH: Free = Gemini (sınırlı), Premium = Claude (yoksa Gemini)
############################################################
gemini.api.key=${GEMINI_API_KEY:__MISSING__}
gemini.timeout.ms=${GEMINI_TIMEOUT_MS:45000}
gemini.coach.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.coach.fallback=${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}
gemini.nutrition.model=${GEMINI_NUTRITION_MODEL:${GEMINI_MODEL:gemini-2.5-flash}}
gemini.nutrition.fallback=${GEMINI_NUTRITION_FALLBACK_MODEL:${GEMINI_FALLBACK_MODEL:gemini-2.5-flash}}

############################################################
# AI COACH RATE LIMIT (ücretsiz = Gemini, 10 istek / 5 dk)
############################################################
ai.coach.rate-limit.max-requests=${AI_COACH_RATE_LIMIT_MAX_REQUESTS:10}
ai.coach.rate-limit.window-seconds=${AI_COACH_RATE_LIMIT_WINDOW_SECONDS:300}
ai.nutrition.rate-limit.max-requests=${AI_NUTRITION_RATE_LIMIT_MAX_REQUESTS:20}
ai.nutrition.rate-limit.window-seconds=${AI_NUTRITION_RATE_LIMIT_WINDOW_SECONDS:300}

############################################################
# CLAUDE (Anthropic) - Premium kullanıcılar için
############################################################
claude.api.key=${CLAUDE_API_KEY:__MISSING__}
claude.model=${CLAUDE_MODEL:claude-haiku-4-5-20251001}
claude.timeout.ms=${CLAUDE_TIMEOUT_MS:30000}

############################################################
# PREMIUM RATE LIMITS (günlük soft-limit)
# PREMIUM RATE LIMITS (günlük soft-limit)
############################################################
ai.premium.rate-limit.max-requests=${AI_PREMIUM_RATE_LIMIT:75}
ai.premium.rate-limit.window-seconds=${AI_PREMIUM_WINDOW:86400}

############################################################
# 💳 PAYMENT (Iyzico)
# provider=sandbox → gerçek API çağrısı yapılmaz, test kartları kabul edilir
# provider=iyzico  → gerçek Iyzico API'si kullanılır (API key gerekli)
#
# Test kartları (sandbox modunda çalışır):
#   5528790000000008  — başarılı Mastercard
#   4766620000000001  — başarılı Visa
#   4111111111111111  — başarılı Visa (yaygın test)
############################################################
payment.provider=${PAYMENT_PROVIDER:sandbox}
iyzico.api.key=${IYZICO_API_KEY:__MISSING__}
iyzico.secret.key=${IYZICO_SECRET_KEY:__MISSING__}
iyzico.base.url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

############################################################
# 📱 IN-APP PURCHASE (App Store & Google Play)
#
# iap.verify.mode seçenekleri:
#   dev    → token boş değilse kabul et (geliştirme/test) [varsayılan]
#   strict → platforma göre Apple/Google sunucusunda doğrula
#
# iOS (App Store Connect → My Apps → Subscriptions → Shared Secret):
#   iap.apple.shared-secret = <shared_secret>
#   iap.apple.bundle-id     = com.fitnessapp  ← Info.plist Bundle ID ile eşleşmeli
#   iap.apple.sandbox       = true  ← TestFlight için true, production için false
#
# Android (Google Play Console → Setup → API Access → Service Account JSON):
#   iap.google.package-name          = com.fitnessapp
#   iap.google.service-account-json  = <single-line-json>
############################################################
iap.verify.mode=${IAP_VERIFY_MODE:dev}
iap.apple.shared-secret=${IAP_APPLE_SHARED_SECRET:__MISSING__}
iap.apple.bundle-id=${IAP_APPLE_BUNDLE_ID:com.fitnessapp.tracker}
iap.apple.sandbox=${IAP_APPLE_SANDBOX:true}
iap.google.package-name=${IAP_GOOGLE_PACKAGE_NAME:com.fitnessapp.tracker}
iap.google.service-account-json=${IAP_GOOGLE_SERVICE_ACCOUNT_JSON:__MISSING__}

############################################################
# ?? MAILER (SMTP Config)
############################################################
quarkus.mailer.from=${MAIL_FROM:${MAIL_USERNAME:your-email@gmail.com}}
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.tls=${MAIL_TLS:false}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.login=REQUIRED
quarkus.mailer.auth-methods=${MAIL_AUTH_METHODS:LOGIN PLAIN}
quarkus.mailer.trust-all=true
quarkus.mailer.username=${MAIL_USERNAME:your-email@gmail.com}
quarkus.mailer.password=${MAIL_PASSWORD:your-app-password}
quarkus.mailer.mock=${MAIL_MOCK:false}
