############################################################
# DEV PROFILE — Yalnızca geliştirme ortamında kullanılır.
# Bu dosyayı production'a kopyalama / deploy etme.
############################################################

# Geliştirme için örnek JWT secret (production'da env'den alınır)
smallrye.jwt.sign.key=dev-only-jwt-secret-key-do-not-use-in-production-min32

# Geliştirme için örnek DB şifresi ve URL
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/fitness_db}
quarkus.datasource.username=${DB_USERNAME:postgres}

# Dev'de IAP doğrulama zorunlu değil
iap.verify.mode=dev

# Dev'de mail mock modda çalışabilir
quarkus.mailer.mock=${MAIL_MOCK:true}
