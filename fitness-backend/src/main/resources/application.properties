############################################################
# ??? DATABASE CONFIG (PostgreSQL)
############################################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=admin123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/fitness_db

############################################################
# ?? HIBERNATE CONFIGURATION
############################################################

# Tabloları otomatik oluştur/güncelle (geliştirme için). Quarkus 3.x: schema-management.strategy
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=true

############################################################
# ?? FLYWAY CONFIGURATION (Database Migrations)
############################################################
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
# Schema zaten dolu ama flyway_schema_history yoksa: history tablosu oluştur, mevcut durumu baseline say, sonra migration'ları uygula
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

############################################################
# ?? HTTP SERVER CONFIG
############################################################
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

############################################################
# ?? CORS CONFIGURATION (Mobil Uygulama İçin)
############################################################
# Quarkus 3.x: quarkus.http.cors.enabled kullanılır (quarkus.http.cors deprecated)
quarkus.http.cors.enabled=true
# Tüm origin'lere izin ver (geliştirme için)
# Production'da sadece mobil app domain'ini ekle
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD
quarkus.http.cors.headers=origin,content-type,accept,authorization,x-requested-with
quarkus.http.cors.access-control-allow-credentials=true

############################################################
# ?? LOGGING CONFIGURATION
############################################################
quarkus.log.level=INFO
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.category."io.quarkus".level=INFO

# Hibernate SQL logları (debug için)
quarkus.log.category."org.hibernate.SQL".level=DEBUG

############################################################
# ?? DEVELOPMENT SETTINGS
############################################################
# DevServices kapalı (manuel PostgreSQL kullanılıyor)
quarkus.devservices.enabled=false
# macOS stty locale hatasi pom.xml JVM args ile cozuldu

############################################################
# ?? APPLICATION CONFIGURATION
############################################################
quarkus.application.name=fitness-backend
quarkus.application.version=1.0.0

############################################################
# ?? JWT (Token oluşturma - login/register)
############################################################
# HS256 için gizli anahtar (en az 32 karakter). Production'da env'den al.
smallrye.jwt.sign.key=fitness-backend-jwt-secret-key-at-least-32-bytes-long
smallrye.jwt.new-token.signature-algorithm=HS256
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=fitness-backend

# Inbound JWT doğrulama (Quarkus Security)
mp.jwt.verify.issuer=fitness-backend
smallrye.jwt.verify.algorithm=HS256

# Manual token validation is used in controllers; disable proactive auth to prevent early framework 401s
quarkus.http.auth.proactive=false


# /api/ai/coach container seviyesinde JWT zorunlu olmasin; controller kendi token kontrolunu yapiyor
quarkus.http.auth.permission.ai-coach.paths=/api/ai/coach
quarkus.http.auth.permission.ai-coach.policy=permit

############################################################
# AI COACH (Gemini) - İsteğe bağlı; yoksa AI istekleri 503 döner
############################################################
gemini.api.key=${GEMINI_API_KEY:__MISSING__}
gemini.timeout.ms=${GEMINI_TIMEOUT_MS:15000}
gemini.coach.model=${GEMINI_MODEL:gemini-2.0-flash}
gemini.coach.fallback=${GEMINI_FALLBACK_MODEL:gemini-1.5-flash}
gemini.nutrition.model=${GEMINI_NUTRITION_MODEL:${GEMINI_MODEL:gemini-2.0-flash}}
gemini.nutrition.fallback=${GEMINI_NUTRITION_FALLBACK_MODEL:${GEMINI_FALLBACK_MODEL:gemini-1.5-flash}}

############################################################
# AI COACH RATE LIMIT
############################################################
ai.coach.rate-limit.max-requests=${AI_COACH_RATE_LIMIT_MAX_REQUESTS:10}
ai.coach.rate-limit.window-seconds=${AI_COACH_RATE_LIMIT_WINDOW_SECONDS:300}
ai.nutrition.rate-limit.max-requests=${AI_NUTRITION_RATE_LIMIT_MAX_REQUESTS:20}
ai.nutrition.rate-limit.window-seconds=${AI_NUTRITION_RATE_LIMIT_WINDOW_SECONDS:300}

